<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Payment - Adeptskil</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h2 {
            color: #667eea;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .header p {
            color: #64748b;
            font-size: 0.95rem;
        }
        .amount-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
        }
        .amount-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .amount-value {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
            font-size: 0.95rem;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        .security-info {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            color: #92400e;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            text-align: center;
        }
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>💳 Credit/Debit Card Payment</h2>
            <p>Secure payment for your course enrollment</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div class="amount-display">
            <div class="amount-label">Payment Amount</div>
            <div class="amount-value" id="paymentAmount">$0.00</div>
            <p style="margin-top: 10px; font-size: 0.9rem;" id="courseName">Loading...</p>
        </div>

        <form id="cardForm" onsubmit="handlePayment(event)">
            <div class="form-group">
                <label for="cardholder">Cardholder Name</label>
                <input type="text" id="cardholder" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="cardNumber">Card Number</label>
                <input type="text" id="cardNumber" class="form-control" placeholder="4242 4242 4242 4242" maxlength="19" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="expiry">Expiry Date (MM/YY)</label>
                    <input type="text" id="expiry" class="form-control" placeholder="12/25" maxlength="5" required>
                </div>
                <div class="form-group">
                    <label for="cvc">CVC</label>
                    <input type="text" id="cvc" class="form-control" placeholder="123" maxlength="4" required>
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-secondary" onclick="goBack()">Back</button>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-lock"></i> Pay Now
                </button>
            </div>
        </form>

        <div class="security-info">
            <i class="fas fa-shield-alt"></i> Your card information is encrypted and secure.
        </div>
    </div>

    <script>
        // Load payment data from session
        function loadPaymentData() {
            const paymentData = JSON.parse(sessionStorage.getItem('paymentData'));
            const urlParams = new URLSearchParams(window.location.search);
            const invoice = urlParams.get('invoice');

            if (paymentData) {
                document.getElementById('paymentAmount').textContent = '$' + paymentData.amount.toFixed(2);
                document.getElementById('courseName').textContent = 'Course: ' + paymentData.enrollment.course;
                document.getElementById('cardholder').value = paymentData.enrollment.fullName;
            }
        }

        // Handle card payment
        function handlePayment(event) {
            event.preventDefault();

            const cardholder = document.getElementById('cardholder').value;
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const expiry = document.getElementById('expiry').value;
            const cvc = document.getElementById('cvc').value;

            // Basic validation
            if (!cardholder || !cardNumber || !expiry || !cvc) {
                showError('Please fill in all card details');
                return;
            }

            if (cardNumber.length !== 16) {
                showError('Card number must be 16 digits');
                return;
            }

            if (cvc.length < 3) {
                showError('CVC must be at least 3 digits');
                return;
            }

            // Show success message
            showSuccess('✓ Payment processed successfully!');

            // Simulate processing
            setTimeout(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const invoice = urlParams.get('invoice');
                
                // Get enrollment data from sessionStorage
                const paymentData = JSON.parse(sessionStorage.getItem('paymentData'));
                if (paymentData) {
                    // Save to localStorage with the key success.html expects
                    const enrollmentDataForSuccess = {
                        fullName: paymentData.enrollment.fullName,
                        email: paymentData.enrollment.email,
                        phone: paymentData.enrollment.phone,
                        company: paymentData.enrollment.company,
                        city: paymentData.enrollment.city,
                        pincode: paymentData.enrollment.pincode,
                        address: paymentData.enrollment.address,
                        course: paymentData.enrollment.course,
                        price: paymentData.amount,
                        invoice: invoice,
                        method: 'creditcard'
                    };
                    localStorage.setItem('adeptskil_enrollment_data', JSON.stringify(enrollmentDataForSuccess));
                    
                    // Redirect with email and data in URL as backup
                    const successUrl = window.location.origin + '/success.html?invoice=' + invoice + '&method=creditcard&email=' + encodeURIComponent(paymentData.enrollment.email) + '&fullName=' + encodeURIComponent(paymentData.enrollment.fullName) + '&course=' + encodeURIComponent(paymentData.enrollment.course) + '&price=' + paymentData.amount;
                    window.location.href = successUrl;
                } else {
                    // Fallback if no payment data
                    window.location.href = window.location.origin + '/success.html?invoice=' + invoice + '&method=creditcard';
                }
            }, 2000);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }

        function goBack() {
            window.history.back();
        }

        // Format card number with spaces
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s/g, '');
            value = value.match(/.{1,4}/g)?.join(' ') || value;
            e.target.value = value;
        });

        // Format expiry date
        document.getElementById('expiry').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            e.target.value = value;
        });

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadPaymentData);
    </script>
</body>
</html>
