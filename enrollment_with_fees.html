<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll in Course - Adeptskil</title>
    <link rel="icon" type="image/jpeg" href="images/FAVICON.jpg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #2c3e50;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        .navbar h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 10px; }
        .navbar a { color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .enrollment-card {
            background: white;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 40px;
        }
        .enrollment-card h2 { font-size: 1.6rem; color: #667eea; margin-bottom: 8px; text-align: center; }
        .enrollment-card p { text-align: center; color: #64748b; margin-bottom: 25px; font-size: 0.95rem; }
        .error-box {
            background: #fee2e2;
            border: 2px solid #fca5a5;
            color: #b91c1c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .error-box.show { display: block; }
        .success-box {
            background: #dcfce7;
            border: 2px solid #86efac;
            color: #166534;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success-box.show { display: block; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: #2c3e50; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-group input[disabled] {
            background: #f0f4f8;
            color: #64748b;
            cursor: not-allowed;
        }
        .inline-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; align-items: end; margin-bottom: 18px; }
        .price-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
            margin-top: 20px;
        }
        .price-label { font-size: 0.9rem; text-transform: uppercase; opacity: 0.9; margin-bottom: 10px; letter-spacing: 1px; }
        .price-amount { font-size: 3rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .price-amount span { font-size: 1.5rem; }
        .option-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0 25px 0;
        }
        .option-card {
            background: linear-gradient(135deg, #f0f4ff 0%, #ede9fe 100%);
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }
        .option-card.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        .option-name { font-weight: 700; display: block; margin-bottom: 8px; }
        .option-price { font-size: 1.2rem; font-weight: 700; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .button-group { display: flex; gap: 15px; margin-top: 25px; }
        button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .required { color: #ef4444; }
        .debug-info { background: #f0f4f8; padding: 12px; border-radius: 8px; margin: 15px 0; font-size: 0.85rem; color: #64748b; font-family: monospace; }
        @media (max-width: 768px) {
            .inline-row, .form-row, .option-grid { grid-template-columns: 1fr; }
            .enrollment-card { padding: 25px; }
            .price-amount { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1><i class="fas fa-graduation-cap"></i> Adeptskil</h1>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
    </div>

    <div class="container">
        <div class="enrollment-card">
            <h2>Enroll in Course</h2>
            <p>Select your pricing option and complete enrollment</p>

            <div id="errorBox" class="error-box"></div>
            <div id="successBox" class="success-box"></div>

            <form id="enrollmentForm" onsubmit="handleSubmit(event)">
                <!-- STEP 1: Course and Pricing Selection -->
                <div class="inline-row">
                    <div class="form-group">
                        <label for="courseName">Selected Course</label>
                        <input type="text" id="courseName" readonly disabled>
                    </div>
                    <div class="form-group">
                        <label for="pricingDropdown">Pricing Option <span class="required">*</span></label>
                        <select id="pricingDropdown" required onchange="handlePricingChange()">
                            <option value="">-- Loading options --</option>
                        </select>
                    </div>
                </div>

                <!-- PRICING OPTIONS GRID -->
                <div id="optionGrid" class="option-grid"></div>

                <!-- PRICE DISPLAY -->
                <div class="price-display">
                    <div class="price-label">Total Investment</div>
                    <div class="price-amount">
                        <span>$</span><span id="priceDisplay">0.00</span>
                    </div>
                </div>

                <!-- Hidden fields -->
                <input type="hidden" id="selectedPrice" value="0">
                <input type="hidden" id="selectedOption" value="">

                <!-- DEBUG INFO -->
                <div id="debugInfo" class="debug-info" style="display: none;"></div>

                <!-- STEP 2: Personal Information -->
                <div class="form-row" style="margin-top: 30px;">
                    <div class="form-group">
                        <label for="fullName">Full Name <span class="required">*</span></label>
                        <input type="text" id="fullName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address <span class="required">*</span></label>
                        <input type="email" id="email" required placeholder="john@example.com">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone Number <span class="required">*</span></label>
                        <input type="tel" id="phone" required placeholder="+1 (555) 000-0000">
                    </div>
                    <div class="form-group">
                        <label for="company">Company (Optional)</label>
                        <input type="text" id="company" placeholder="Your Company">
                    </div>
                </div>

                <div class="form-group">
                    <label for="comments">Additional Comments (Optional)</label>
                    <textarea id="comments" style="min-height: 80px;" placeholder="Any questions or special requests?"></textarea>
                </div>

                <!-- BUTTONS -->
                <div class="button-group">
                    <button type="button" onclick="resetForm()" style="background: #e2e8f0; color: #2c3e50;">Clear Form</button>
                    <button type="submit" class="btn-primary" id="submitBtn" disabled>Proceed to Payment</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let courseData = null;
        let selectedPricing = null;
        const DEBUG = false; // Set to true to see debug info

        function showDebug(msg) {
            if (DEBUG) {
                console.log('[DEBUG]', msg);
                const debugBox = document.getElementById('debugInfo');
                debugBox.style.display = 'block';
                debugBox.textContent += msg + '\n';
            }
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.classList.add('show');
            console.error('[ERROR]', msg);
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        function showSuccess(msg) {
            const box = document.getElementById('successBox');
            box.textContent = msg;
            box.classList.add('show');
        }

        async function loadCourseData() {
            try {
                const params = new URLSearchParams(window.location.search);
                const courseName = params.get('course') || '';
                
                showDebug(`URL parameter received: "${courseName}"`);

                if (!courseName) {
                    showError('No course selected. Please go back to courses page and select a course.');
                    return;
                }

                document.getElementById('courseName').value = courseName;

                // Call API
                const apiUrl = `course_fees_api.php?action=get_course&course=${encodeURIComponent(courseName)}`;
                showDebug(`API URL: ${apiUrl}`);

                const response = await fetch(apiUrl);
                showDebug(`API Response Status: ${response.status}`);

                const data = await response.json();
                showDebug(`API Response: ${JSON.stringify(data).substring(0, 100)}...`);

                if (!data.success) {
                    showError(`API Error: ${data.error || 'Unknown error'}`);
                    return;
                }

                if (!data.data) {
                    showError('No course data received from API');
                    return;
                }

                courseData = data.data;
                showDebug(`Course loaded: ${courseData.name}`);
                hideError();
                populateOptions();

            } catch (error) {
                showError(`Fatal Error: ${error.message}`);
                console.error('Full error:', error);
            }
        }

        function populateOptions() {
            showDebug('Populating pricing options...');

            if (!courseData || !courseData.pricing) {
                showError('Course pricing data is missing');
                return;
            }

            const dropdown = document.getElementById('pricingDropdown');
            const grid = document.getElementById('optionGrid');

            dropdown.innerHTML = '<option value="">-- Choose pricing option --</option>';
            grid.innerHTML = '';

            const options = [
                { key: 'standard', label: 'Standard Fee' },
                { key: 'early_bird', label: 'Early Bird Fee' },
                { key: 'virtual_standard', label: 'Live Virtual Standard' },
                { key: 'virtual_early_bird', label: 'Live Virtual Early Bird' }
            ];

            let addedCount = 0;

            options.forEach(opt => {
                const pricing = courseData.pricing[opt.key];
                if (!pricing) {
                    showDebug(`Missing pricing for ${opt.key}`);
                    return;
                }

                // Add to dropdown
                const option = document.createElement('option');
                option.value = JSON.stringify({ key: opt.key, ...pricing });
                option.textContent = `${opt.label} - $${pricing.price.toFixed(2)}`;
                dropdown.appendChild(option);

                // Add to grid
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerHTML = `
                    <span class="option-name">${opt.label}</span>
                    <span class="option-price">$${pricing.price.toFixed(2)}</span>
                `;
                card.onclick = () => selectOption(opt.key, pricing);
                grid.appendChild(card);

                addedCount++;
            });

            showDebug(`Added ${addedCount} pricing options to form`);

            if (addedCount === 0) {
                showError('No pricing options available for this course');
            }
        }

        function selectOption(key, pricing) {
            showDebug(`Selected: ${key} at $${pricing.price}`);
            selectedPricing = { key, ...pricing };

            // Update dropdown
            document.getElementById('pricingDropdown').value = JSON.stringify(selectedPricing);

            // Update grid selection
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');

            updateDisplay();
        }

        function handlePricingChange() {
            const val = document.getElementById('pricingDropdown').value;
            if (val) {
                selectedPricing = JSON.parse(val);
                
                // Update grid
                document.querySelectorAll('.option-card').forEach(card => {
                    card.classList.remove('selected');
                });
                const cards = document.querySelectorAll('.option-card');
                const priceText = `$${selectedPricing.price.toFixed(2)}`;
                for (let card of cards) {
                    if (card.textContent.includes(priceText)) {
                        card.classList.add('selected');
                        break;
                    }
                }

                updateDisplay();
            }
        }

        function updateDisplay() {
            if (!selectedPricing) return;

            document.getElementById('priceDisplay').textContent = selectedPricing.price.toFixed(2);
            document.getElementById('selectedPrice').value = selectedPricing.price.toFixed(2);
            document.getElementById('selectedOption').value = selectedPricing.name;
            document.getElementById('submitBtn').disabled = false;
        }

        function resetForm() {
            document.getElementById('enrollmentForm').reset();
            document.getElementById('pricingDropdown').dispatchEvent(new Event('change'));
            document.getElementById('submitBtn').disabled = true;
        }

        function handleSubmit(event) {
            event.preventDefault();

            if (!selectedPricing) {
                showError('Please select a pricing option');
                return;
            }

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!fullName || !email || !phone) {
                showError('Please fill in all required fields');
                return;
            }

            const enrollmentData = {
                course: document.getElementById('courseName').value,
                fullName,
                email,
                phone,
                company: document.getElementById('company').value,
                comments: document.getElementById('comments').value,
                pricing_option: selectedPricing.name,
                amount: parseFloat(selectedPricing.price)
            };

            sessionStorage.setItem('enrollmentData', JSON.stringify(enrollmentData));

            showSuccess('Enrollment successful! Redirecting to payment...');
            setTimeout(() => {
                window.location.href = `success.html?course=${encodeURIComponent(enrollmentData.course)}&amount=${enrollmentData.amount}&option=${encodeURIComponent(enrollmentData.pricing_option)}`;
            }, 1500);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadCourseData);
    </script>
</body>
</html>
