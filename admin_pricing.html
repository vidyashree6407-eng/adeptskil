<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pricing Management - Adeptskil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .admin-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .admin-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .admin-header p {
            opacity: 0.9;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stats-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .stats-card .stat-label {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 1rem 1.5rem;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .tab-content.active {
            display: block;
        }

        .course-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .course-table thead {
            background: #f8fafc;
        }

        .course-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
            color: #475569;
        }

        .course-table td {
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .course-table tr:hover {
            background: #f8fafc;
        }

        .badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge.category {
            background: #e0e7ff;
            color: #667eea;
        }

        .price-badge {
            background: #dcfce7;
            color: #15803d;
            font-weight: 700;
        }

        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .offer-card {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .offer-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
        }

        .offer-card h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }

        .offer-code {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .offer-details {
            color: #64748b;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .offer-details p {
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2d3748;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .search-box input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .message.success {
            background: #ecfdf5;
            border: 1px solid #10b981;
            color: #047857;
        }

        .message.error {
            background: #fef2f2;
            border: 1px solid #ef4444;
            color: #991b1b;
        }

        .message.show {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .admin-container {
                padding: 1rem;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .course-table {
                font-size: 0.85rem;
            }

            .course-table th,
            .course-table td {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1>💼 Admin Dashboard - Pricing Management</h1>
            <p>Manage course pricing, offers, and view enrollment statistics</p>
        </div>

        <!-- Stats Cards -->
        <div class="dashboard-grid">
            <div class="stats-card">
                <div class="stat-label">📚 Total Courses</div>
                <div class="stat-value" id="totalCourses">0</div>
            </div>
            <div class="stats-card">
                <div class="stat-label">💰 Average Price</div>
                <div class="stat-value" id="avgPrice">$0</div>
            </div>
            <div class="stats-card">
                <div class="stat-label">💵 Min Price</div>
                <div class="stat-value" id="minPrice">$0</div>
            </div>
            <div class="stats-card">
                <div class="stat-label">💎 Max Price</div>
                <div class="stat-value" id="maxPrice">$0</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('courses')">
                📚 All Courses
            </button>
            <button class="tab-btn" onclick="switchTab('offers')">
                🎁 Offers & Discounts
            </button>
            <button class="tab-btn" onclick="switchTab('categories')">
                🏷️ Categories
            </button>
        </div>

        <!-- Tab: All Courses -->
        <div class="tab-content active" id="courses-tab">
            <div class="search-box">
                <input type="text" id="courseSearch" placeholder="Search courses...">
                <button class="btn btn-primary" onclick="searchCourses()">Search</button>
            </div>
            <div id="coursesContainer">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading courses...</p>
                </div>
            </div>
        </div>

        <!-- Tab: Offers -->
        <div class="tab-content" id="offers-tab">
            <h2 style="margin-bottom: 2rem;">🎁 Active Offers</h2>
            <div class="offers-grid" id="offersContainer">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Tab: Categories -->
        <div class="tab-content" id="categories-tab">
            <h2 style="margin-bottom: 2rem;">📊 Courses by Category</h2>
            <div id="categoriesContainer">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // API Functions
        async function getAllCourses() {
            try {
                const response = await fetch('course_pricing_manager.php?action=calculate_prices');
                return await response.json();
            } catch (error) {
                console.error('Error fetching courses:', error);
                return null;
            }
        }

        async function getOffers() {
            try {
                const response = await fetch('course_pricing_manager.php?action=get_offers');
                return await response.json();
            } catch (error) {
                console.error('Error fetching offers:', error);
                return null;
            }
        }

        // Initialize Dashboard
        async function initializeDashboard() {
            const data = await getAllCourses();
            
            if (data) {
                // Update stats
                document.getElementById('totalCourses').textContent = data.total_courses;
                document.getElementById('avgPrice').textContent = '$' + data.price_range.average;
                document.getElementById('minPrice').textContent = '$' + data.price_range.min;
                document.getElementById('maxPrice').textContent = '$' + data.price_range.max;

                // Display courses
                displayCourses(data.courses);
            }

            // Load offers
            const offersData = await getOffers();
            if (offersData) {
                displayOffers(offersData.offers);
            }
        }

        // Display all courses
        function displayCourses(courses) {
            const container = document.getElementById('coursesContainer');
            
            let html = `
                <table class="course-table">
                    <thead>
                        <tr>
                            <th>Course Name</th>
                            <th>Category</th>
                            <th>Duration</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            courses.forEach(course => {
                html += `
                    <tr>
                        <td>${course.name}</td>
                        <td><span class="badge category">${course.category}</span></td>
                        <td>${course.duration}</td>
                        <td><span class="badge price-badge">${course.price}</span></td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        // Display offers
        function displayOffers(offers) {
            const container = document.getElementById('offersContainer');
            
            const offerDetails = {
                'WELCOME15': {
                    title: '🎉 Welcome Offer',
                    desc: '15% off for new customers',
                    eligibility: 'Valid for: All courses\nRestrictions: First-time customers only'
                },
                'TEAM20': {
                    title: '👥 Team Training Offer',
                    desc: '20% off when enrolling 5+ people',
                    eligibility: 'Valid for: All courses\nMinimum: 5 participants'
                },
                'EXTENDED25': {
                    title: '📚 Extended Training Offer',
                    desc: '25% off for courses 3+ days',
                    eligibility: 'Valid for: All courses\nMinimum: 3-day courses'
                },
                'CORPORATE30': {
                    title: '🏢 Corporate Annual Package',
                    desc: '30% off + Unlimited access for 1 year',
                    eligibility: 'Investment: $9,999/year\nBenefit: All 134+ courses'
                }
            };

            let html = '';
            offers.forEach(offer => {
                const details = offerDetails[offer.code] || {};
                html += `
                    <div class="offer-card">
                        <h3>${details.title}</h3>
                        <div class="offer-code">${offer.code}</div>
                        <div class="offer-details">
                            <p><strong>Discount:</strong> ${offer.discount_percent}%</p>
                            <p>${details.desc}</p>
                            <p style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e2e8f0;">
                                <strong>Eligibility:</strong> ${details.eligibility.replace(/\n/g, '<br>')}
                            </p>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Search courses
        function searchCourses() {
            const searchTerm = document.getElementById('courseSearch').value.toLowerCase();
            const rows = document.querySelectorAll('.course-table tbody tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        }

        // Initialize on load
        window.addEventListener('load', initializeDashboard);
    </script>
</body>
</html>
